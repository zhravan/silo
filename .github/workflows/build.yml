name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

env:
  GO_VERSION: "1.24"

jobs:
  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
        run: |
          BINARY="silo"
          [ "${{ matrix.goos }}" = "windows" ] && BINARY="silo.exe"
          go build -ldflags="-s -w" -o "$BINARY" ./cmd/silo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: silo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ matrix.goos == 'windows' && 'silo.exe' || 'silo' }}

  release:
    name: release
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: build
    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Validate version.txt
        run: |
          if [ ! -f version.txt ]; then
            echo "::error::version.txt is missing. Add version.txt with the release version (e.g. 0.0.1)."
            exit 1
          fi
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading 'v' if present (v0.0.1 -> 0.0.1)
          EXPECTED="${TAG#v}"
          ACTUAL=$(cat version.txt | tr -d '\r' | xargs)
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::version.txt is not updated. version.txt has '$ACTUAL' but release tag is '$TAG' (expected version '$EXPECTED'). Update version.txt to match the release tag before publishing."
            exit 1
          fi
          echo "version.txt matches release tag: $ACTUAL"

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.event.release.tag_name }}" \
            -q .body)
          VERSION=$(cat version.txt | tr -d '\r' | xargs)
          {
            echo "## Release v${VERSION}"
            echo ""
            echo "$BODY"
          } > release_notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/silo-*; do
            name=$(basename "$dir")
            binary="$dir/silo"
            [ -f "$dir/silo.exe" ] && binary="$dir/silo.exe"
            [ -f "$binary" ] && cp "$binary" "release/${name}${binary##*silo}"
          done
          ls -la release/

      - name: Upload release assets and notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          body_path: release_notes.md
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
