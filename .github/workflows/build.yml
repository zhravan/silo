name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.0.1)"
        required: true
      ref:
        description: "Commit SHA where this version is in version.txt"
        required: true

env:
  GO_VERSION: "1.24"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
        run: |
          BINARY="silo"
          [ "${{ matrix.goos }}" = "windows" ] && BINARY="silo.exe"
          go build -ldflags="-s -w" -o "$BINARY" ./cmd/silo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: silo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ matrix.goos == 'windows' && 'silo.exe' || 'silo' }}

  release:
    name: release
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) || (github.event_name == 'release' && github.event.action == 'published') || github.event_name == 'workflow_dispatch'
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || (github.event_name == 'release' && github.event.release.target_commitish || github.sha) }}
          fetch-depth: 0

      - name: Resolve version and tag (push to main)
        if: github.event_name == 'push'
        id: tag_push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f version.txt ]; then
            echo "::error::version.txt is missing. Bump version in version.txt (e.g. 0.0.1) and push to main to trigger a release."
            exit 1
          fi
          VERSION=$(cat version.txt | tr -d '\r' | xargs)
          TAG="v${VERSION#v}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve version and tag (manual / retrigger)
        if: github.event_name == 'workflow_dispatch'
        id: tag_manual
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          TAG="v${VERSION#v}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag (push to main)
        if: github.event_name == 'push' && steps.tag_push.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.tag_push.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create and push tag (manual / retrigger)
        if: github.event_name == 'workflow_dispatch' && steps.tag_manual.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.tag_manual.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Validate version.txt (release published)
        if: github.event_name == 'release'
        run: |
          if [ ! -f version.txt ]; then
            echo "::error::version.txt is missing."
            exit 1
          fi
          TAG="${{ github.event.release.tag_name }}"
          EXPECTED="${TAG#v}"
          ACTUAL=$(cat version.txt | tr -d '\r' | xargs)
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::version.txt has '$ACTUAL' but release tag is '$TAG'. Update version.txt to match."
            exit 1
          fi

      - name: Set release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ steps.tag_manual.outputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ steps.tag_push.outputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          BODY=$(gh api repos/${{ github.repository }}/releases/generate-notes -f tag_name="$TAG" -q .body)
          VERSION=$(cat version.txt | tr -d '\r' | xargs)
          {
            echo "## Release v${VERSION}"
            echo ""
            echo "$BODY"
          } > release_notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/silo-*; do
            name=$(basename "$dir")
            binary="$dir/silo"
            [ -f "$dir/silo.exe" ] && binary="$dir/silo.exe"
            [ -f "$binary" ] && cp "$binary" "release/${name}${binary##*silo}"
          done
          ls -la release/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          body_path: release_notes.md
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
